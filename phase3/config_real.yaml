# ──────────────────────────────────────────────────────────────────────────
# REAL PORTFOLIO — $10K pilot (small-scale live trading)
#
# This config mirrors config.yaml (paper) except for:
#   - paths.holdings_log  → separate Excel for real positions
#   - paths.output_dir    → separate artifact tree
#   - portfolio.*         → scaled down to $10K
#   - shadow              → mirrors paper (enabled for candidate validation)
#   - profile_tag         → "REAL" (email subject prefix)
#
# All other settings (signal, strategy, regime, exits) are identical
# to ensure paper and real portfolios behave the same way.
# ──────────────────────────────────────────────────────────────────────────
profile_tag: "REAL"
paths:
  notebook: "../0315 windows\uC774\uC0AC.ipynb"
  frozen_signal: /Users/shin-il/Documents/my stock/cache_fmp_c2_1/output/frozen_signal_V2_GOLDEN_ENS_L3_v1_20260419.npz
  fmp_cache_root: /Users/shin-il/Documents/my stock/cache_fmp_c2_1
  holdings_log: /Users/shin-il/Documents/my stock/cache_fmp_c2_1/output/holdings_log_real.xlsx
  output_dir: /Users/shin-il/Documents/my stock/cache_fmp_c2_1/output_real
  regime_signal_paths:
    BULL: /Users/shin-il/Documents/my stock/cache_fmp_c2_1/output/frozen_signal_BULL_GA_20260417_232732.npz
    SIDE: null
    DEFENSIVE: null
portfolio:
  total_capital: 10000.0
  initial_cash: 10000.0
  daily_buy_limit: 400.0
  top_n: 20
  max_weight_cap: 0.12
  hold_buffer_n: 30
  weight_mode: score_weighted
  entry_score_margin: 8.0
regime:
  vix_bull_threshold: 18.0
  vix_defensive_threshold: 30.0
  circuit_breaker_vix_threshold: 35.0
  circuit_breaker_cash_pct: 0.5
  regime_bull_top_n: 20
  regime_bull_max_weight_cap: 0.12
  regime_side_top_n: 15
  regime_side_max_weight_cap: 0.12
  regime_side_cash_pct: 0.2
  regime_defensive_top_n: 10
  regime_defensive_max_weight_cap: 0.15
  regime_defensive_cash_pct: 0.35
  regime_blend_enabled: true
  # BULL/SIDE transition zone: vix_bull_threshold ± bull_side_blend_width
  # → 18.0 ± 0.8 = [17.2, 18.8]  (narrowed from ±2.0=[16,20] on 2026-05-09)
  bull_side_blend_width: 0.8
  side_def_blend_width: 3.0
regime_compose:
  enabled: false
  log_per_regime_metrics: true
triggers:
  min_interval_days: 7
  max_interval_days: 14
  vix_emergency: 30.0
  vix_recovery: 25.0
  drift_threshold: 0.15
  score_change_threshold: 0.2
strategy:
  rebalance_mode: daily
  rebalance_gap_threshold: 0.02
  buy_allocation_mode: gap_proportional
  enable_trim: true
  trim_threshold: 0.03
  sell_grace_days: 60
  buy_grace_days: 3
  min_buy_shares: 1
  enable_stop_loss: true
  stop_loss_pct: -15.0
  buy_limit_mode: adaptive
  adaptive_deploy_rate: 0.1
  adaptive_min_limit: 500.0
  target_invest_pct: 0.97
  regime_overrides:
    BULL:
      adaptive_deploy_rate: 0.2
      enable_stop_loss: true
      target_invest_pct: 0.98
    SIDE:
      sell_grace_days: 120
      adaptive_deploy_rate: 0.1
      enable_stop_loss: false
    DEF:
      adaptive_deploy_rate: 0.1
      enable_stop_loss: false
  exit_triggers:
    - type: stop_loss
      regimes: [BULL]
      params:
        threshold_pct: -15.0
    - type: sell_grace
      regimes: [BULL]
      params:
        days: 60
    - type: sell_grace
      regimes: [SIDE]
      params:
        days: 120
    - type: sell_grace
      regimes: [DEF]
      params:
        days: 60
    - type: profit_target
      regimes: [SIDE, DEF]
      params:
        target_pct: 30.0
        action: TRIM
        partial_pct: 0.12
        score_gate_enabled: false
        extension_enabled: true
        extension_window: 20
        extension_threshold: 0.20
        min_days_held: 10
shadow:
  enabled: true
  frozen_signal: /Users/shin-il/Documents/my stock/cache_fmp_c2_1/output/frozen_signal_P11_OOS_CLEAN_L3_FUNDB_ANCHOR_20260508_180824.npz
  label: "P11_FUNDB_ANCHOR"
  start_date: "2026-05-08"
  duration_days: 30
  include_in_email: true
email:
