# ────────────────────────────────────────────────────────────────────────
# Baseline v2.1 (cutover 2026-03-28): SIDE_DEF_p12 — adds a regime-gated
# profit_target trigger on top of the legacy baseline exits. See
# docs/baseline_v2_1_side_def_p12.md for design/rationale and scenarios.
#
# Rollback path: remove the exit_triggers block; build_triggers will fall
# back to enable_stop_loss / sell_grace_days legacy keys which are kept
# below as the single-source-of-truth documentation of baseline semantics.
# ────────────────────────────────────────────────────────────────────────
strategy:
  rebalance_mode: daily
  rebalance_gap_threshold: 0.02
  buy_allocation_mode: gap_proportional
  enable_trim: true
  trim_threshold: 0.03
  sell_grace_days: 60
  # buy_grace_days — Idea 2 (variant a, strict). A non-held ticker must
  # appear in the regime-correct top-N on each of the last K rebalance
  # days before a NEW position opens (BUY_MORE on already-held names is
  # exempt). 3 was selected by the p3_buy_grace_sweep (2026-04-25):
  # full-period CAGR Δ −0.12 pp, Commission Δ −8.43 pp (−20 % rel.),
  # MDD slightly improved; 6-fold walk-forward mean α vs SPY +0.55 pp
  # vs g=0. See phase3/docs/p3_buy_grace_sweep_20260425_142422.md.
  # Set to 0 to disable (byte-identical to legacy).
  buy_grace_days: 3
  min_buy_shares: 1
  enable_stop_loss: true
  stop_loss_pct: -15.0
  buy_limit_mode: adaptive
  adaptive_deploy_rate: 0.1
  adaptive_min_limit: 500.0
  target_invest_pct: 0.97
  regime_overrides:
    BULL:
      adaptive_deploy_rate: 0.2
      enable_stop_loss: true
      target_invest_pct: 0.98
    SIDE:
      sell_grace_days: 120
      adaptive_deploy_rate: 0.1
      enable_stop_loss: false
    DEF:
      adaptive_deploy_rate: 0.1
      enable_stop_loss: false
  # Explicit exit-trigger stack. When this block is present, build_triggers
  # ignores enable_stop_loss / sell_grace_days above and uses ONLY this list.
  # Baseline part (stop_loss + sell_grace) is a 1:1 re-expression of legacy
  # semantics; profit_target is the new SIDE_DEF_p12 add-on.
  exit_triggers:
    # ── Baseline exits (unchanged from pre-v2.1) ───────────────────────
    - type: stop_loss
      regimes: [BULL]
      params:
        threshold_pct: -15.0
    - type: sell_grace
      regimes: [BULL]
      params:
        days: 60
    - type: sell_grace
      regimes: [SIDE]
      params:
        days: 120
    - type: sell_grace
      regimes: [DEF]
      params:
        days: 60
    # ── v2.1 add-on: regime-gated profit-taking (SIDE + DEF only) ──────
    # Fires when a position held >=10d shows unrealized PnL >= 30.0%
    # AND the price is extended >=20% above its 20-day MA. Trims ~12% of
    # shares per fire, disarmed by tier memory until the 30% tier resets.
    - type: profit_target
      regimes: [SIDE, DEF]
      params:
        target_pct: 30.0
        action: TRIM
        partial_pct: 0.12
        score_gate_enabled: false
        extension_enabled: true
        extension_window: 20
        extension_threshold: 0.20
        min_days_held: 10
